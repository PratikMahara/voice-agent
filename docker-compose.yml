version "3.8"
services:
  mongodb:
  container_name: mongodb
  image: mongo:latest
  volumes:
    - ./backend/data:/data
  ports:
    - "27017:27017"

  backend:
    container_name: backend
    build: ./backend 
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/voice-agent
      - JWT_SECRET=your_jwt_secret_key
      - OPENAI_API_KEY=your_openai_api_key
      - PORT=5000   
  frontend:
    container_name: frontend
    build: ./frontend     

    ports:
      - "3000:3000"     
    depends_on:
      - backend
    environment:  
      - REACT_APP_API_BASE_URL=http://localhost:5000
      
