apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: interviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: pratikmahara/ai-interviewer-frontend:latest
          ports:
            - containerPort: 5173
          env: 
            - name: REACT_APP_API_URL
              value: "http://backend-service:8000"
          envFrom:
            - secretRef:
                name: interviewer-frontend-secret     
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: interviewer
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30001
