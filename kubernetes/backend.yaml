apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: interviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: pratikmahara/interviewer-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017/Interviewer"
          envFrom:
            - secretRef: 
                name: interviewer-backend-secret
---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: interviewer
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000
            
